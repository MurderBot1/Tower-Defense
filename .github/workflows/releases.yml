name: Build & Release Multi‑Platform Executables

on:
  push:
    branches:
      - deploy

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python -m PyInstaller main.spec

      - name: Prepare packaged directory
        shell: bash
        run: |
          OSNAME="${{ matrix.os }}"
          PKG_DIR="Tower-Defense-${OSNAME}"
          mkdir -p "$PKG_DIR/exe"
          mkdir -p "$PKG_DIR/assets"

          # Move executable
          if [[ "$OSNAME" == "windows-latest" ]]; then
            mv dist/tower-defense.exe "$PKG_DIR/exe/"
          else
            mv dist/tower-defense "$PKG_DIR/exe/"
          fi

          # Copy assets
          cp -r assets/* "$PKG_DIR/assets/"

          # Zip it
          zip -r "${PKG_DIR}.zip" "$PKG_DIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.os }}
          path: Tower-Defense-${{ matrix.os }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: builds

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: dev-${{ github.run_number }}
          release_name: "Dev Multi‑Platform Build ${{ github.run_number }}"
          draft: false
          prerelease: true

      - name: Upload Linux package
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: builds/package-ubuntu-latest/Tower-Defense-ubuntu-latest.zip
          asset_name: Tower-Defense-linux.zip
          asset_content_type: application/zip

      - name: Upload macOS package
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: builds/package-macos-latest/Tower-Defense-macos-latest.zip
          asset_name: Tower-Defense-macos.zip
          asset_content_type: application/zip

      - name: Upload Windows package
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: builds/package-windows-latest/Tower-Defense-windows-latest.zip
          asset_name: Tower-Defense-windows.zip
          asset_content_type: application/zip
