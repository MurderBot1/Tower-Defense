name: Cross‑Platform Run Check

on:
  push:
  pull_request:

jobs:
  run-check:
    name: Run on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script for 3 seconds
        run: |
          python src/main.py &
          PID=$!
          sleep 3
          kill $PID || true
        shell: bash
